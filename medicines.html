<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الأدوية - صيدلية الميسم للطوارئ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html">
        <div class="brand-logo">+</div>
        <div>
          <h1>صيدلية الميسم للطوارئ</h1>
          <p>القضارف • 24 ساعة</p>
        </div>
      </a>

      <button class="menu-toggle" id="menuToggle">☰</button>

      <nav class="main-nav" id="mainNav">
        <a href="index.html">الرئيسية</a>
        <a href="medicines.html" class="active">الأدوية</a>
        <a href="admin.html" class="admin-link">لوحة التحكم</a>
      </nav>
    </div>
  </header>

  <section class="page-hero small-hero">
    <div class="container">
      <span class="section-kicker">الأدوية البشرية</span>
      <h2>تصفح جميع الأدوية</h2>
      <p>ابحث عن الدواء بالاسم أو التصنيف أو الشركة المنتجة.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="card filters-card">
        <div class="filters-grid">
          <div class="field">
            <label for="medicineSearch">بحث عن دواء</label>
            <input type="text" id="medicineSearch" placeholder="مثال: Panadol" />
          </div>

          <div class="field">
            <label for="categoryFilter">التصنيف</label>
            <select id="categoryFilter">
              <option value="">كل التصنيفات</option>
            </select>
          </div>

          <div class="field">
            <label for="availabilityFilter">التوفر</label>
            <select id="availabilityFilter">
              <option value="">الكل</option>
              <option value="available">متوفر</option>
              <option value="unavailable">غير متوفر</option>
            </select>
          </div>
        </div>
      </div>

      <div class="results-bar">
        <p id="resultsCount">0 دواء</p>
      </div>

      <div class="grid cards-grid" id="medicinesGrid"></div>

      <div class="empty-box" id="noMedicines" style="display:none;">
        لا توجد أدوية مطابقة لنتائج البحث.
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>© 2026 صيدلية الميسم للطوارئ</p>
      <a href="index.html">العودة للرئيسية</a>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/medicines.js"></script>
</body>
</html>

<button onclick="logout()">تسجيل خروج</button>

<script>
function logout(){
  localStorage.removeItem("user");
  window.location.href = "login.html";
}
</script>

</body>
</html
